<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omnexor Dashboard</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            stage: '#f8fafc',
          },
        },
      },
    };
  </script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background-color: #f8fafc;
    }
  </style>
</head>

<body
  class="min-h-screen bg-[#f8fafc] text-gray-800 antialiased"
  x-data="{
    sidebarOpen: true,
    activeNav: 'dashboard',
    navItems: [
      { id: 'dashboard',  label: 'Dashboard',  icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
      { id: 'analytics',  label: 'Analytics',  icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' },
      { id: 'projects',   label: 'Projects',   icon: 'M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z' },
      { id: 'team',       label: 'Team',       icon: 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z' },
      { id: 'settings',   label: 'Settings',   icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z' },
    ]
  }"
>

  <!-- ===== App Shell ===== -->
  <div class="flex h-screen overflow-hidden">

    <!-- ===== Sidebar ===== -->
    <aside
      :class="sidebarOpen ? 'w-64' : 'w-16'"
      class="relative flex flex-col flex-shrink-0 bg-white border-r border-gray-200 transition-all duration-300 ease-in-out overflow-hidden"
    >

      <!-- Sidebar Header / Logo -->
      <div class="flex items-center h-16 px-4 border-b border-gray-200 flex-shrink-0">
        <div class="flex items-center gap-3 min-w-0">
          <!-- Logo mark -->
          <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <!-- Brand name (hidden when collapsed) -->
          <span
            x-show="sidebarOpen"
            x-transition:enter="transition-opacity duration-200 delay-100"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="transition-opacity duration-100"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
            class="text-lg font-semibold text-gray-900 whitespace-nowrap"
          >
            Omnexor
          </span>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 px-2 py-4 space-y-1 overflow-y-auto">
        <template x-for="item in navItems" :key="item.id">
          <button
            @click="activeNav = item.id"
            :class="{
              'bg-indigo-50 text-indigo-700': activeNav === item.id,
              'text-gray-600 hover:bg-gray-100 hover:text-gray-900': activeNav !== item.id
            }"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1"
            :title="!sidebarOpen ? item.label : ''"
          >
            <!-- Icon -->
            <svg
              class="flex-shrink-0 w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="1.75"
            >
              <path stroke-linecap="round" stroke-linejoin="round" :d="item.icon" />
            </svg>
            <!-- Label (hidden when collapsed) -->
            <span
              x-show="sidebarOpen"
              x-transition:enter="transition-opacity duration-200 delay-100"
              x-transition:enter-start="opacity-0"
              x-transition:enter-end="opacity-100"
              x-transition:leave="transition-opacity duration-100"
              x-transition:leave-start="opacity-100"
              x-transition:leave-end="opacity-0"
              class="whitespace-nowrap"
              x-text="item.label"
            ></span>
          </button>
        </template>
      </nav>

      <!-- Sidebar Footer: User Profile -->
      <div class="flex-shrink-0 border-t border-gray-200 p-3">
        <div class="flex items-center gap-3 min-w-0">
          <div class="flex-shrink-0 w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
            <span class="text-xs font-semibold text-indigo-700">JD</span>
          </div>
          <div
            x-show="sidebarOpen"
            x-transition:enter="transition-opacity duration-200 delay-100"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="transition-opacity duration-100"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
            class="min-w-0"
          >
            <p class="text-sm font-medium text-gray-900 truncate">Jane Doe</p>
            <p class="text-xs text-gray-500 truncate">jane@omnexor.io</p>
          </div>
        </div>
      </div>

      <!-- Collapse / Expand Toggle -->
      <button
        @click="sidebarOpen = !sidebarOpen"
        class="absolute top-1/2 -right-3 -translate-y-1/2 w-6 h-6 rounded-full bg-white border border-gray-200 shadow-sm flex items-center justify-center text-gray-500 hover:text-indigo-600 hover:border-indigo-300 transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-indigo-500 z-10"
        :title="sidebarOpen ? 'Collapse sidebar' : 'Expand sidebar'"
      >
        <svg
          class="w-3.5 h-3.5 transition-transform duration-300"
          :class="sidebarOpen ? 'rotate-0' : 'rotate-180'"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          stroke-width="2.5"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
    </aside>
    <!-- ===== /Sidebar ===== -->

    <!-- ===== Main Area ===== -->
    <div class="flex flex-col flex-1 min-w-0 overflow-hidden">

      <!-- Top Bar -->
      <header class="flex-shrink-0 flex items-center justify-between h-16 px-6 bg-white border-b border-gray-200">

        <!-- Mobile sidebar toggle (visible on small screens) -->
        <button
          @click="sidebarOpen = !sidebarOpen"
          class="md:hidden p-1.5 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>

        <!-- Page title (driven by active nav) -->
        <h1 class="text-base font-semibold text-gray-900 capitalize" x-text="activeNav"></h1>

        <!-- Right-side actions -->
        <div class="flex items-center gap-3">
          <!-- Notifications -->
          <button class="relative p-1.5 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            <!-- Badge -->
            <span class="absolute top-1 right-1 w-2 h-2 rounded-full bg-red-500 ring-2 ring-white"></span>
          </button>

          <!-- Avatar -->
          <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center cursor-pointer">
            <span class="text-xs font-semibold text-indigo-700">JD</span>
          </div>
        </div>
      </header>

      <!-- ===== Content Area ===== -->
      <main class="flex-1 overflow-y-auto bg-[#f8fafc] p-6">

        <!-- Slot: page content goes here -->
        <div class="max-w-7xl mx-auto">

          <!-- Example placeholder content -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
            <template x-for="(card, i) in [
              { label: 'Total Revenue',   value: '$48,295',  change: '+12.5%', up: true  },
              { label: 'Active Projects', value: '24',       change: '+3',     up: true  },
              { label: 'Team Members',    value: '138',      change: '-2',     up: false },
              { label: 'Uptime',          value: '99.98%',   change: '+0.02%', up: true  },
            ]" :key="i">
              <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
                <p class="text-xs font-medium text-gray-500 uppercase tracking-wide" x-text="card.label"></p>
                <p class="mt-2 text-2xl font-bold text-gray-900" x-text="card.value"></p>
                <p
                  class="mt-1 text-xs font-medium"
                  :class="card.up ? 'text-emerald-600' : 'text-red-500'"
                  x-text="card.change + ' from last month'"
                ></p>
              </div>
            </template>
          </div>

          <!-- Content placeholder -->
          <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
            <h2 class="text-sm font-semibold text-gray-700 mb-4">Content Area</h2>
            <p class="text-sm text-gray-500">
              This is the main content region. Replace this placeholder with page-specific components
              for each section of the Omnexor Dashboard.
            </p>
          </div>

        </div>
        <!-- /Slot -->

      </main>
      <!-- ===== /Content Area ===== -->

    </div>
    <!-- ===== /Main Area ===== -->

  </div>
  <!-- ===== /App Shell ===== -->

</body>
</html>
