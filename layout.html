<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Control Omnexor</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            stage: '#f8fafc',
          },
        },
      },
    };
  </script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      min-height: 100%;
    }

    /* Main app shell: fixed compact dimensions */
    .app-shell {
      width: 900px;
      height: 600px;
      flex-shrink: 0;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      border-radius: 0.75rem;
      background: #ffffff;
    }

    /* Responsive: smaller screens */
    @media (max-width: 900px) {
      .app-shell {
        width: 100%;
        height: auto;
        min-height: 0;
      }
    }

    /* Hardware-accelerated animations */
    [x-transition] {
      will-change: transform, opacity;
    }

    /* Simplify shadows — use border only */
    .shadow-sm, .shadow-md, .shadow-xl, .shadow-lg {
      box-shadow: none !important;
    }
  </style>
</head>

<body
  class="bg-[#f8fafc] text-gray-800 antialiased"
  x-data="{
    sidebarOpen: true,
    activeNav: 'panel',
    navItems: [
      { id: 'panel',      label: 'Panel',                icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
      { id: 'analiticas', label: 'Analíticas',           icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' },
      { id: 'proyectos',  label: 'Proyectos',            icon: 'M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z' },
      { id: 'clientes',   label: 'Clientes Potenciales', icon: 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z' },
      { id: 'equipo',     label: 'Equipo',               icon: 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z' },
      { id: 'ajustes',    label: 'Ajustes',              icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z' },
    ]
  }"
>

  <!-- ===== App Shell ===== -->
  <div class="app-shell flex overflow-hidden">

    <!-- ===== Sidebar ===== -->
    <aside
      :class="sidebarOpen ? 'w-64' : 'w-16'"
      class="relative flex flex-col flex-shrink-0 bg-white border-r border-gray-200 transition-all duration-300 ease-in-out overflow-hidden"
      style="will-change: transform, opacity;"
    >

      <!-- Sidebar Header / Logo -->
      <div class="flex items-center h-16 px-4 border-b border-gray-200 flex-shrink-0">
        <div class="flex items-center gap-3 min-w-0">
          <!-- Logo mark -->
          <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <!-- Brand name (hidden when collapsed) -->
          <span
            x-show="sidebarOpen"
            x-transition:enter="transition-opacity duration-200 delay-100"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="transition-opacity duration-100"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
            class="text-lg font-semibold text-gray-900 whitespace-nowrap"
            style="will-change: transform, opacity;"
          >
            Omnexor
          </span>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 px-2 py-4 space-y-1 overflow-y-auto">
        <template x-for="item in navItems" :key="item.id">
          <button
            @click="activeNav = item.id"
            :class="{
              'bg-indigo-50 text-indigo-700': activeNav === item.id,
              'text-gray-600 hover:bg-gray-100 hover:text-gray-900': activeNav !== item.id
            }"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1"
            :title="!sidebarOpen ? item.label : ''"
          >
            <!-- Icon -->
            <svg
              class="flex-shrink-0 w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="1.75"
            >
              <path stroke-linecap="round" stroke-linejoin="round" :d="item.icon" />
            </svg>
            <!-- Label (hidden when collapsed) -->
            <span
              x-show="sidebarOpen"
              x-transition:enter="transition-opacity duration-200 delay-100"
              x-transition:enter-start="opacity-0"
              x-transition:enter-end="opacity-100"
              x-transition:leave="transition-opacity duration-100"
              x-transition:leave-start="opacity-100"
              x-transition:leave-end="opacity-0"
              class="whitespace-nowrap"
              x-text="item.label"
            ></span>
          </button>
        </template>
      </nav>

      <!-- Sidebar Footer: User Profile -->
      <div class="flex-shrink-0 border-t border-gray-200 p-3">
        <div class="flex items-center gap-3 min-w-0">
          <div class="flex-shrink-0 w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
            <span class="text-xs font-semibold text-indigo-700">JD</span>
          </div>
          <div
            x-show="sidebarOpen"
            x-transition:enter="transition-opacity duration-200 delay-100"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="transition-opacity duration-100"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
            class="min-w-0"
          >
            <p class="text-sm font-medium text-gray-900 truncate">Jane Doe</p>
            <p class="text-xs text-gray-500 truncate">jane@omnexor.io</p>
          </div>
        </div>
      </div>

      <!-- Collapse / Expand Toggle -->
      <button
        @click="sidebarOpen = !sidebarOpen"
        class="absolute top-1/2 -right-3 -translate-y-1/2 w-6 h-6 rounded-full bg-white border border-gray-200 shadow-sm flex items-center justify-center text-gray-500 hover:text-indigo-600 hover:border-indigo-300 transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-indigo-500 z-10"
        :title="sidebarOpen ? 'Contraer barra lateral' : 'Expandir barra lateral'"
      >
        <svg
          class="w-3.5 h-3.5 transition-transform duration-300"
          :class="sidebarOpen ? 'rotate-0' : 'rotate-180'"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          stroke-width="2.5"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
    </aside>
    <!-- ===== /Sidebar ===== -->

    <!-- ===== Main Area ===== -->
    <div class="flex flex-col flex-1 min-w-0 overflow-hidden">

      <!-- Top Bar -->
      <header class="flex-shrink-0 flex items-center justify-between h-16 px-6 bg-white border-b border-gray-200">

        <!-- Mobile sidebar toggle (visible on small screens) -->
        <button
          @click="sidebarOpen = !sidebarOpen"
          class="md:hidden p-1.5 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>

        <!-- Page title (driven by active nav) -->
        <h1 class="text-base font-semibold text-gray-900" x-text="navItems.find(n => n.id === activeNav)?.label || activeNav"></h1>

        <!-- Right-side actions -->
        <div class="flex items-center gap-3">
          <!-- Notifications -->
          <button class="relative p-1.5 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            <!-- Badge -->
            <span class="absolute top-1 right-1 w-2 h-2 rounded-full bg-red-500 ring-2 ring-white"></span>
          </button>

          <!-- Avatar -->
          <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center cursor-pointer">
            <span class="text-xs font-semibold text-indigo-700">JD</span>
          </div>
        </div>
      </header>

      <!-- ===== Content Area ===== -->
      <main class="flex-1 overflow-y-auto bg-[#f8fafc] p-6">

        <!-- ── Panel (Dashboard) ── -->
        <div x-show="activeNav === 'panel'" class="max-w-7xl mx-auto">
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
            <template x-for="(card, i) in [
              { label: 'Ingresos Totales',    value: '$48,295',  change: '+12.5%', up: true  },
              { label: 'Proyectos Activos',   value: '24',       change: '+3',     up: true  },
              { label: 'Miembros del Equipo', value: '138',      change: '-2',     up: false },
              { label: 'Disponibilidad',      value: '99.98%',   change: '+0.02%', up: true  },
            ]" :key="i">
              <div class="bg-white rounded-xl border border-[#e2e8f0] p-5">
                <p class="text-xs font-medium text-gray-500 uppercase tracking-wide" x-text="card.label"></p>
                <p class="mt-2 text-2xl font-bold text-gray-900" x-text="card.value"></p>
                <p
                  class="mt-1 text-xs font-medium"
                  :class="card.up ? 'text-emerald-600' : 'text-red-500'"
                  x-text="card.change + ' respecto al mes anterior'"
                ></p>
              </div>
            </template>
          </div>
          <div class="bg-white rounded-xl border border-[#e2e8f0] p-6">
            <h2 class="text-sm font-semibold text-gray-700 mb-4">Área de Contenido</h2>
            <p class="text-sm text-gray-500">
              Esta es la región de contenido principal. Reemplaza este marcador de posición con componentes
              específicos de cada sección del Panel de Control Omnexor.
            </p>
          </div>
        </div>

        <!-- ── Clientes Potenciales (Kanban) ── -->
        <div x-show="activeNav === 'clientes'" x-data="kanban()" class="w-full">

          <!-- Sub-header -->
          <div class="flex items-center justify-between flex-wrap gap-3 mb-5">
            <div>
              <p class="text-sm text-gray-500">Pipeline de ventas — gestiona tus leads por etapa</p>
            </div>
            <button
              @click="openModal()"
              class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
              </svg>
              Nuevo Lead
            </button>
          </div>

          <!-- Kanban Board -->
          <div class="overflow-x-auto pb-4">
            <div class="flex gap-4 min-w-max">
              <template x-for="col in columns" :key="col.id">
                <div class="flex flex-col w-72 flex-shrink-0">

                  <!-- Column Header -->
                  <div class="flex items-center justify-between px-4 py-3 rounded-t-xl bg-indigo-600">
                    <div class="flex items-center gap-2">
                      <span class="text-sm font-semibold text-white" x-text="col.title"></span>
                      <span
                        class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-white/20 text-white text-xs font-bold"
                        x-text="col.leads.length"
                      ></span>
                    </div>
                    <span class="text-xs font-medium text-indigo-100" x-text="formatTotal(col.leads)"></span>
                  </div>

                  <!-- Cards Container -->
                  <div
                    class="flex-1 flex flex-col gap-3 p-3 bg-indigo-50/60 rounded-b-xl min-h-[12rem] max-h-[18rem] overflow-y-auto"
                    style="scrollbar-width:thin;scrollbar-color:#c7d2fe transparent;"
                    @dragover.prevent
                    @drop="drop($event, col.id)"
                  >
                    <template x-for="lead in col.leads.slice(0, 5)" :key="lead.id">
                      <div
                        class="bg-white rounded-2xl border border-[#e2e8f0] p-4 cursor-grab active:cursor-grabbing group"
                        style="will-change: transform, opacity;"
                        draggable="true"
                        @dragstart="dragStart($event, lead.id, col.id)"
                      >
                        <!-- Name + source -->
                        <div class="flex items-start justify-between gap-2 mb-3">
                          <div class="flex items-center gap-2 min-w-0">
                            <div class="flex-shrink-0 w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
                              <span class="text-xs font-bold text-indigo-700" x-text="initials(lead.nombre)"></span>
                            </div>
                            <div class="min-w-0">
                              <p class="text-sm font-semibold text-gray-900 truncate" x-text="lead.nombre"></p>
                              <p class="text-xs text-gray-400 truncate" x-text="lead.empresa || '—'"></p>
                            </div>
                          </div>
                          <span
                            class="flex-shrink-0 inline-block px-2 py-0.5 rounded-full text-[10px] font-semibold uppercase tracking-wide"
                            :class="sourceBadge(lead.fuente)"
                            x-text="lead.fuente"
                          ></span>
                        </div>

                        <div class="border-t border-gray-100 my-2"></div>

                        <!-- Value + date -->
                        <div class="flex items-center justify-between text-xs text-gray-500">
                          <div class="flex items-center gap-1">
                            <svg class="w-3.5 h-3.5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <span class="font-semibold text-gray-700" x-text="formatCurrency(lead.valor)"></span>
                          </div>
                          <div class="flex items-center gap-1">
                            <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <span x-text="lead.fecha"></span>
                          </div>
                        </div>

                        <!-- Labels -->
                        <div class="mt-3 grid grid-cols-3 gap-1 text-[10px] text-gray-400">
                          <div>
                            <span class="block font-medium text-gray-500 uppercase tracking-wide">Nombre</span>
                            <span class="truncate block" x-text="lead.nombre"></span>
                          </div>
                          <div>
                            <span class="block font-medium text-gray-500 uppercase tracking-wide">Valor</span>
                            <span class="truncate block" x-text="formatCurrency(lead.valor)"></span>
                          </div>
                          <div>
                            <span class="block font-medium text-gray-500 uppercase tracking-wide">Fuente</span>
                            <span class="truncate block" x-text="lead.fuente"></span>
                          </div>
                        </div>

                        <!-- Actions -->
                        <div class="mt-3 flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-150">
                          <button @click="editLead(lead)" class="flex-1 text-xs text-indigo-600 font-medium py-1 rounded-md hover:bg-indigo-50 transition-colors">Editar</button>
                          <button @click="deleteLead(lead.id, col.id)" class="flex-1 text-xs text-red-500 font-medium py-1 rounded-md hover:bg-red-50 transition-colors">Eliminar</button>
                        </div>
                      </div>
                    </template>

                    <!-- Empty state -->
                    <div x-show="col.leads.length === 0" class="flex flex-col items-center justify-center py-10 text-gray-300 select-none">
                      <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                      </svg>
                      <p class="text-xs">Sin leads en esta etapa</p>
                    </div>
                  </div>

                </div>
              </template>
            </div>
          </div>

          <!-- Add / Edit Modal -->
          <div
            x-show="modal.open"
            x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="transition ease-in duration-150"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
            class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm"
            style="will-change: transform, opacity;"
            @click.self="closeModal()"
          >
            <div
              x-show="modal.open"
              x-transition:enter="transition ease-out duration-200"
              x-transition:enter-start="opacity-0 scale-95"
              x-transition:enter-end="opacity-100 scale-100"
              x-transition:leave="transition ease-in duration-150"
              x-transition:leave-start="opacity-100 scale-100"
              x-transition:leave-end="opacity-0 scale-95"
              class="bg-white rounded-2xl border border-[#e2e8f0] w-full max-w-md p-6"
              style="will-change: transform, opacity;"
            >
              <div class="flex items-center justify-between mb-5">
                <h2 class="text-base font-bold text-gray-900" x-text="modal.editing ? 'Editar Lead' : 'Nuevo Lead'"></h2>
                <button @click="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>
              <form @submit.prevent="saveLead()" class="space-y-4">
                <div>
                  <label class="block text-xs font-semibold text-gray-600 mb-1">Nombre del contacto <span class="text-red-500">*</span></label>
                  <input x-model="modal.form.nombre" type="text" placeholder="Ej. María García" required class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-600 mb-1">Empresa</label>
                  <input x-model="modal.form.empresa" type="text" placeholder="Ej. Acme S.A." class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-600 mb-1">Valor estimado (MXN)</label>
                  <input x-model.number="modal.form.valor" type="number" min="0" step="100" placeholder="0" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-600 mb-1">Fuente</label>
                  <select x-model="modal.form.fuente" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white">
                    <option value="Web">Web</option>
                    <option value="Referido">Referido</option>
                    <option value="LinkedIn">LinkedIn</option>
                    <option value="Email">Email</option>
                    <option value="Evento">Evento</option>
                    <option value="Otro">Otro</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-600 mb-1">Etapa</label>
                  <select x-model="modal.form.columna" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white">
                    <template x-for="col in columns" :key="col.id">
                      <option :value="col.id" x-text="col.title"></option>
                    </template>
                  </select>
                </div>
                <div class="flex gap-3 pt-2">
                  <button type="button" @click="closeModal()" class="flex-1 px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">Cancelar</button>
                  <button type="submit" class="flex-1 px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition-colors" x-text="modal.editing ? 'Guardar cambios' : 'Agregar lead'"></button>
                </div>
              </form>
            </div>
          </div>

        </div>

        <!-- ── Other sections placeholder ── -->
        <div x-show="!['panel','clientes'].includes(activeNav)" class="max-w-7xl mx-auto">
          <div class="bg-white rounded-xl border border-[#e2e8f0] p-10 text-center">
            <p class="text-sm text-gray-400">Sección en construcción.</p>
          </div>
        </div>

      </main>
      <!-- ===== /Content Area ===== -->

    </div>
    <!-- ===== /Main Area ===== -->

  </div>
  <!-- ===== /App Shell ===== -->

  <!-- ===== Kanban Component Logic ===== -->
  <script>
    function kanban() {
      return {
        drag: { leadId: null, fromCol: null },
        modal: {
          open: false,
          editing: false,
          editId: null,
          form: { nombre: '', empresa: '', valor: 0, fuente: 'Web', columna: 'nuevo' },
        },
        columns: [
          {
            id: 'nuevo',
            title: 'Nuevo Lead',
            leads: [
              { id: 1, nombre: 'Carlos Mendoza',  empresa: 'TechSol MX',      valor: 45000,  fuente: 'Web',      fecha: '24 feb' },
              { id: 2, nombre: 'Laura Ríos',       empresa: 'Grupo Ríos',      valor: 120000, fuente: 'Referido', fecha: '25 feb' },
              { id: 3, nombre: 'Andrés Castillo',  empresa: '',                valor: 18000,  fuente: 'LinkedIn', fecha: '26 feb' },
            ],
          },
          {
            id: 'calificado',
            title: 'Lead Calificado',
            leads: [
              { id: 4, nombre: 'Sofía Herrera',    empresa: 'Innovatek',       valor: 75000,  fuente: 'Email',    fecha: '20 feb' },
              { id: 5, nombre: 'Miguel Torres',    empresa: 'Distribuidora T', valor: 200000, fuente: 'Evento',   fecha: '22 feb' },
            ],
          },
          {
            id: 'no-calificado',
            title: 'Lead NO calificado',
            leads: [
              { id: 6, nombre: 'Patricia Vega',    empresa: 'Vega & Asoc.',    valor: 5000,   fuente: 'Web',      fecha: '18 feb' },
            ],
          },
          {
            id: 'contactado',
            title: 'Contactado',
            leads: [
              { id: 7, nombre: 'Roberto Salinas',  empresa: 'Salinas Corp',    valor: 95000,  fuente: 'Referido', fecha: '15 feb' },
              { id: 8, nombre: 'Diana Morales',    empresa: 'DM Consulting',   valor: 60000,  fuente: 'LinkedIn', fecha: '17 feb' },
            ],
          },
          {
            id: 'reunion',
            title: 'Reunión Agendada',
            leads: [
              { id: 9,  nombre: 'Fernando Leal',   empresa: 'Leal Ventures',   valor: 350000, fuente: 'Referido', fecha: '12 feb' },
              { id: 10, nombre: 'Valeria Núñez',   empresa: 'NúñezTech',       valor: 180000, fuente: 'Evento',   fecha: '14 feb' },
            ],
          },
        ],
        nextId() {
          return Math.max(0, ...this.columns.flatMap(c => c.leads.map(l => l.id))) + 1;
        },
        initials(name) {
          return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
        },
        formatCurrency(val) {
          return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', maximumFractionDigits: 0 }).format(val || 0);
        },
        formatTotal(leads) {
          return this.formatCurrency(leads.reduce((a, l) => a + (l.valor || 0), 0));
        },
        sourceBadge(fuente) {
          const map = {
            Web:      'bg-blue-100 text-blue-700',
            Referido: 'bg-emerald-100 text-emerald-700',
            LinkedIn: 'bg-indigo-100 text-indigo-700',
            Email:    'bg-amber-100 text-amber-700',
            Evento:   'bg-purple-100 text-purple-700',
            Otro:     'bg-gray-100 text-gray-600',
          };
          return map[fuente] || map['Otro'];
        },
        dragStart(event, leadId, colId) {
          this.drag = { leadId, fromCol: colId };
          event.dataTransfer.effectAllowed = 'move';
        },
        drop(event, toColId) {
          const { leadId, fromCol } = this.drag;
          if (!leadId || fromCol === toColId) return;
          const from = this.columns.find(c => c.id === fromCol);
          const to   = this.columns.find(c => c.id === toColId);
          if (!from || !to) return;
          const idx = from.leads.findIndex(l => l.id === leadId);
          if (idx === -1) return;
          const [lead] = from.leads.splice(idx, 1);
          to.leads.push(lead);
          this.drag = { leadId: null, fromCol: null };
        },
        openModal() {
          this.modal = { open: true, editing: false, editId: null, form: { nombre: '', empresa: '', valor: 0, fuente: 'Web', columna: this.columns[0].id } };
        },
        editLead(lead) {
          const col = this.columns.find(c => c.leads.some(l => l.id === lead.id));
          this.modal = { open: true, editing: true, editId: lead.id, form: { nombre: lead.nombre, empresa: lead.empresa || '', valor: lead.valor, fuente: lead.fuente, columna: col?.id || this.columns[0].id } };
        },
        saveLead() {
          const today = new Date().toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
          if (this.modal.editing) {
            for (const col of this.columns) {
              const idx = col.leads.findIndex(l => l.id === this.modal.editId);
              if (idx !== -1) {
                const lead = col.leads[idx];
                Object.assign(lead, { nombre: this.modal.form.nombre, empresa: this.modal.form.empresa, valor: this.modal.form.valor, fuente: this.modal.form.fuente });
                if (col.id !== this.modal.form.columna) {
                  col.leads.splice(idx, 1);
                  this.columns.find(c => c.id === this.modal.form.columna)?.leads.push(lead);
                }
                break;
              }
            }
          } else {
            this.columns.find(c => c.id === this.modal.form.columna)?.leads.push({
              id: this.nextId(), nombre: this.modal.form.nombre, empresa: this.modal.form.empresa,
              valor: this.modal.form.valor, fuente: this.modal.form.fuente, fecha: today,
            });
          }
          this.closeModal();
        },
        closeModal() { this.modal.open = false; },
        deleteLead(leadId, colId) {
          const col = this.columns.find(c => c.id === colId);
          if (col) col.leads = col.leads.filter(l => l.id !== leadId);
        },
      };
    }
  </script>

</body>
