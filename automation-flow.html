<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omnexor — Automation Flow</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: transparent;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Outer container ── */
    .flow-widget {
      position: relative;
      width: 420px;
      height: 380px;
      background: #ffffff;
      border-radius: 1.5rem;
      box-shadow: 0 8px 40px rgba(59,130,246,0.10), 0 2px 8px rgba(59,130,246,0.06);
      border: 1px solid rgba(59,130,246,0.12);
      overflow: hidden;
    }

    /* ── SVG canvas (lines) ── */
    .flow-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Animated line ── */
    .flow-line {
      stroke: #3b82f6;
      stroke-width: 1.5;
      stroke-dasharray: 6 4;
      fill: none;
      opacity: 0.25;
      transition: opacity 0.4s ease, stroke-width 0.4s ease;
    }
    .flow-line.active {
      opacity: 1;
      stroke-width: 2;
      animation: dash-flow 1.2s linear infinite;
    }
    @keyframes dash-flow {
      to { stroke-dashoffset: -20; }
    }

    /* ── Central lead avatar ── */
    .lead-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.375rem;
      z-index: 10;
    }
    .lead-avatar {
      position: relative;
      width: 64px;
      height: 64px;
    }
    /* Pulsing rings */
    .pulse-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(59,130,246,0.35);
      animation: ring-pulse 2s ease-out infinite;
    }
    .pulse-ring:nth-child(2) {
      inset: -16px;
      animation-delay: 0.6s;
      border-color: rgba(59,130,246,0.2);
    }
    .pulse-ring:nth-child(3) {
      inset: -24px;
      animation-delay: 1.2s;
      border-color: rgba(59,130,246,0.1);
    }
    @keyframes ring-pulse {
      0%   { transform: scale(0.85); opacity: 0; }
      30%  { opacity: 1; }
      100% { transform: scale(1.15); opacity: 0; }
    }
    .avatar-inner {
      position: relative;
      z-index: 2;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(59,130,246,0.35);
    }
    .lead-label {
      font-size: 0.6875rem;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .lead-sub {
      font-size: 0.625rem;
      color: #64748b;
      margin-top: -0.25rem;
    }

    /* ── Channel cards ── */
    .channel-card {
      position: absolute;
      width: 130px;
      background: #f8fafc;
      border: 1.5px solid rgba(59,130,246,0.12);
      border-radius: 0.875rem;
      padding: 0.625rem 0.75rem;
      box-shadow: 0 2px 12px rgba(59,130,246,0.06);
      transition: border-color 0.35s ease, box-shadow 0.35s ease, transform 0.35s ease;
      z-index: 10;
    }
    .channel-card.active {
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1), 0 4px 20px rgba(59,130,246,0.15);
      transform: scale(1.04);
    }
    .channel-icon {
      width: 28px;
      height: 28px;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.375rem;
    }
    .channel-name {
      font-size: 0.6875rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 0.2rem;
    }
    .channel-msg {
      font-size: 0.6rem;
      color: #64748b;
      line-height: 1.4;
    }
    .channel-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      margin-top: 0.375rem;
      font-size: 0.5625rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 99px;
    }

    /* Card positions */
    /* WhatsApp — top-left */
    .card-whatsapp {
      top: 40px;
      left: 20px;
    }
    /* Email — top-right */
    .card-email {
      top: 40px;
      right: 20px;
    }
    /* SMS — bottom-center */
    .card-sms {
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
    }
    .card-sms.active {
      transform: translateX(-50%) scale(1.04);
    }

    /* ── Floating chart (bottom-right) ── */
    .chart-widget {
      position: absolute;
      bottom: 14px;
      right: 14px;
      width: 130px;
      background: #ffffff;
      border: 1px solid rgba(59,130,246,0.15);
      border-radius: 0.875rem;
      padding: 0.625rem 0.75rem;
      box-shadow: 0 4px 16px rgba(59,130,246,0.08);
      z-index: 20;
    }
    .chart-title {
      font-size: 0.5625rem;
      font-weight: 700;
      color: #1e293b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.375rem;
    }
    .chart-svg {
      width: 100%;
      height: 40px;
    }
    .chart-stat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.375rem;
    }
    .chart-value {
      font-size: 0.875rem;
      font-weight: 800;
      color: #3b82f6;
    }
    .chart-trend {
      font-size: 0.5625rem;
      font-weight: 600;
      color: #10b981;
      background: rgba(16,185,129,0.1);
      padding: 0.1rem 0.4rem;
      border-radius: 99px;
    }

    /* ── Header label ── */
    .widget-header {
      position: absolute;
      top: 14px;
      left: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 20;
    }
    .widget-title {
      font-size: 0.6875rem;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 0.03em;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
    }
    .live-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #3b82f6;
      animation: live-pulse 1.6s ease-in-out infinite;
    }
    @keyframes live-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }
    .live-text {
      font-size: 0.5625rem;
      font-weight: 600;
      color: #3b82f6;
    }
  </style>
</head>

<body>
  <div
    class="flow-widget"
    x-data="automationFlow()"
    x-init="init()"
  >

    <!-- Header -->
    <div class="widget-header">
      <span class="widget-title">Flujo de Nutrición</span>
      <div class="live-badge">
        <div class="live-dot"></div>
        <span class="live-text">Automatizado</span>
      </div>
    </div>

    <!-- SVG Lines -->
    <svg class="flow-svg" viewBox="0 0 420 380" preserveAspectRatio="none">
      <!-- Line: center → WhatsApp card (top-left) -->
      <line
        x1="210" y1="190"
        x2="85"  y2="105"
        class="flow-line"
        :class="activeChannel === 0 ? 'active' : ''"
      />
      <!-- Line: center → Email card (top-right) -->
      <line
        x1="210" y1="190"
        x2="335" y2="105"
        class="flow-line"
        :class="activeChannel === 1 ? 'active' : ''"
      />
      <!-- Line: center → SMS card (bottom-center) -->
      <line
        x1="210" y1="190"
        x2="210" y2="285"
        class="flow-line"
        :class="activeChannel === 2 ? 'active' : ''"
      />
    </svg>

    <!-- Central Lead Avatar -->
    <div class="lead-center">
      <div class="lead-avatar">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="avatar-inner">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>
      </div>
      <span class="lead-label">Lead</span>
      <span class="lead-sub">Nuevo contacto</span>
    </div>

    <!-- WhatsApp Card (top-left) -->
    <div class="channel-card card-whatsapp" :class="activeChannel === 0 ? 'active' : ''">
      <div class="channel-icon" style="background: rgba(37,211,102,0.12);">
        <svg style="width:16px;height:16px;color:#25d366;" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
      </div>
      <div class="channel-name">WhatsApp</div>
      <div class="channel-msg">"¡Hola! Tu sesión está lista..."</div>
      <div class="channel-badge" style="background:rgba(37,211,102,0.1);color:#16a34a;">
        <svg style="width:8px;height:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
        Enviado
      </div>
    </div>

    <!-- Email Card (top-right) -->
    <div class="channel-card card-email" :class="activeChannel === 1 ? 'active' : ''">
      <div class="channel-icon" style="background: rgba(59,130,246,0.12);">
        <svg style="width:16px;height:16px;color:#3b82f6;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
      </div>
      <div class="channel-name">Email</div>
      <div class="channel-msg">Secuencia de Nurturing activa</div>
      <div class="channel-badge" style="background:rgba(59,130,246,0.1);color:#3b82f6;">
        <svg style="width:8px;height:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        Activa
      </div>
    </div>

    <!-- SMS Card (bottom-center) -->
    <div class="channel-card card-sms" :class="activeChannel === 2 ? 'active' : ''">
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <div class="channel-icon" style="background:rgba(139,92,246,0.12);margin-bottom:0;flex-shrink:0;">
          <svg style="width:16px;height:16px;color:#8b5cf6;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
          </svg>
        </div>
        <div>
          <div class="channel-name">SMS</div>
          <div class="channel-msg">Recordatorio enviado</div>
        </div>
        <div class="channel-badge" style="background:rgba(139,92,246,0.1);color:#8b5cf6;margin-top:0;margin-left:auto;flex-shrink:0;">
          <svg style="width:8px;height:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
          OK
        </div>
      </div>
    </div>

    <!-- Floating Chart (bottom-right) -->
    <div class="chart-widget">
      <div class="chart-title">Escalado de Oportunidades</div>
      <svg class="chart-svg" viewBox="0 0 110 40" preserveAspectRatio="none">
        <!-- Area fill -->
        <defs>
          <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.02"/>
          </linearGradient>
        </defs>
        <path
          d="M0,38 C10,35 20,30 30,26 C40,22 50,18 60,14 C70,10 80,7 90,5 C100,3 105,2 110,1 L110,40 L0,40 Z"
          fill="url(#chartGrad)"
        />
        <!-- Line -->
        <path
          d="M0,38 C10,35 20,30 30,26 C40,22 50,18 60,14 C70,10 80,7 90,5 C100,3 105,2 110,1"
          fill="none"
          stroke="#3b82f6"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <!-- End dot -->
        <circle cx="110" cy="1" r="3" fill="#3b82f6" />
        <circle cx="110" cy="1" r="5" fill="rgba(59,130,246,0.2)" />
      </svg>
      <div class="chart-stat">
        <span class="chart-value" x-text="'×' + multiplier"></span>
        <span class="chart-trend">↑ +34%</span>
      </div>
    </div>

  </div>

  <script>
    function automationFlow() {
      return {
        activeChannel: 0,
        multiplier: 3.2,
        cycleTimer: null,
        multiplierTimer: null,

        init() {
          // Cycle through channels every 2 seconds
          this.cycleTimer = setInterval(() => {
            this.activeChannel = (this.activeChannel + 1) % 3;
          }, 2000);

          // Slowly increment multiplier for the chart
          this.multiplierTimer = setInterval(() => {
            this.multiplier = parseFloat((this.multiplier + 0.1).toFixed(1));
            if (this.multiplier > 9.9) this.multiplier = 3.2;
          }, 3000);
        },
      };
    }
  </script>
</body>
</html>
