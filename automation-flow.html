<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omnexor — Automation Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: transparent;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ── Widget shell ── */
    .widget {
      position: relative;
      width: 440px;
      height: 420px;
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 24px rgba(59,130,246,0.08), 0 1px 4px rgba(0,0,0,0.04);
      overflow: hidden;
      pointer-events: none;
      user-select: none;
    }

    /* ── SVG lines layer ── */
    .svg-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .dline {
      stroke: #cbd5e1;
      stroke-width: 1.5;
      stroke-dasharray: 5 4;
      fill: none;
      transition: stroke 0.4s ease, stroke-width 0.4s ease;
    }
    .dline.on {
      stroke: #3b82f6;
      stroke-width: 2;
      animation: dash-anim 1s linear infinite;
    }
    @keyframes dash-anim { to { stroke-dashoffset: -18; } }

    /* ── Central LEAD node ── */
    .lead-node {
      position: absolute;
      /* Center of widget: 220px from left, 210px from top */
      top: 210px;
      left: 220px;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 30;
    }
    .lead-ring-outer {
      position: relative;
      width: 72px;
      height: 72px;
      flex-shrink: 0;
    }
    /* Pulsing ring */
    .pulse-r {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(59,130,246,0.28);
      animation: pr 2.5s ease-out infinite;
    }
    .pr1 { inset: -7px; }
    .pr2 { inset: -15px; border-color: rgba(59,130,246,0.12); animation-delay: 1s; }
    @keyframes pr {
      0%   { transform: scale(0.88); opacity: 0; }
      20%  { opacity: 1; }
      100% { transform: scale(1.12); opacity: 0; }
    }
    .lead-circle {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(59,130,246,0.30);
      z-index: 2;
    }
    /* LEAD label — single, sharp, no duplicates */
    .lead-text {
      font-size: 11px;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
      white-space: nowrap;
    }

    /* ── Channel cards ── */
    .card {
      position: absolute;
      width: 138px;
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 2px 12px rgba(59,130,246,0.06), 0 1px 3px rgba(0,0,0,0.04);
      z-index: 20;
      transition: border-color 0.35s ease, box-shadow 0.35s ease;
    }
    .card.on {
      border-color: rgba(59,130,246,0.45);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.08), 0 4px 20px rgba(59,130,246,0.14);
    }

    /* Fixed positions — no overlap */
    /* WhatsApp: top-left */
    .c-wa  { top: 52px;  left: 18px; }
    /* Email: top-right */
    .c-em  { top: 52px;  right: 18px; }
    /* SMS: bottom-center, directly below LEAD */
    .c-sms { bottom: 72px; left: 50%; transform: translateX(-50%); }

    /* Card internals */
    .ci {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 7px;
      flex-shrink: 0;
    }
    .ct { font-size: 11px; font-weight: 700; color: #1e293b; margin-bottom: 3px; line-height: 1.2; }
    .cm { font-size: 9.5px; color: #64748b; line-height: 1.4; margin-bottom: 6px; }
    .cb {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 9px; font-weight: 600;
      padding: 2px 7px; border-radius: 99px;
      line-height: 1.4;
    }

    /* ── Chart card (bottom-right) ── */
    .chart {
      position: absolute;
      bottom: 14px; right: 14px;
      width: 138px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 2px 12px rgba(59,130,246,0.07);
      z-index: 25;
    }
    .chart-ttl {
      font-size: 7.5px; font-weight: 700;
      color: #94a3b8; text-transform: uppercase;
      letter-spacing: 0.07em; margin-bottom: 8px;
      line-height: 1.3;
    }
    .chart-svg { width: 100%; height: 38px; display: block; }
    .chart-row {
      display: flex; align-items: center;
      justify-content: space-between; margin-top: 6px;
    }
    .chart-v { font-size: 17px; font-weight: 800; color: #3b82f6; letter-spacing: -0.02em; line-height: 1; }
    .chart-p {
      font-size: 9px; font-weight: 600; color: #10b981;
      background: rgba(16,185,129,0.10); padding: 2px 7px; border-radius: 99px;
    }
  </style>
</head>

<body>
  <div class="widget" x-data="{ch:0}" x-init="setInterval(()=>ch=(ch+1)%3, 2000)">

    <!-- SVG dashed lines -->
    <svg class="svg-layer" viewBox="0 0 440 420" preserveAspectRatio="none">
      <!-- center(220,210) → WhatsApp card center(87,117) -->
      <line x1="220" y1="210" x2="87"  y2="117" class="dline" :class="ch===0?'on':''"/>
      <!-- center(220,210) → Email card center(353,117) -->
      <line x1="220" y1="210" x2="353" y2="117" class="dline" :class="ch===1?'on':''"/>
      <!-- center(220,210) → SMS card center(220,313) -->
      <line x1="220" y1="210" x2="220" y2="313" class="dline" :class="ch===2?'on':''"/>
    </svg>

    <!-- ★ Central LEAD node — ONLY "LEAD" text below icon ★ -->
    <div class="lead-node">
      <div class="lead-ring-outer">
        <div class="pulse-r pr1"></div>
        <div class="pulse-r pr2"></div>
        <div class="lead-circle">
          <svg width="28" height="28" fill="none" stroke="#ffffff" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </div>
      </div>
      <span class="lead-text">Lead</span>
    </div>

    <!-- WhatsApp Card (top-left) -->
    <div class="card c-wa" :class="ch===0?'on':''">
      <div class="ci" style="background:rgba(37,211,102,0.12)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#25d366">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
      </div>
      <div class="ct">WhatsApp</div>
      <div class="cm">"¡Hola! Tu sesión está lista..."</div>
      <div class="cb" style="background:rgba(37,211,102,0.10);color:#16a34a">
        <svg width="7" height="7" fill="none" stroke="#16a34a" stroke-width="3.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
        Enviado
      </div>
    </div>

    <!-- Email Card (top-right) -->
    <div class="card c-em" :class="ch===1?'on':''">
      <div class="ci" style="background:rgba(59,130,246,0.12)">
        <svg width="16" height="16" fill="none" stroke="#3b82f6" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <div class="ct">Email</div>
      <div class="cm">Secuencia de Nurturing activa</div>
      <div class="cb" style="background:rgba(59,130,246,0.10);color:#3b82f6">
        <svg width="7" height="7" fill="none" stroke="#3b82f6" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Activa
      </div>
    </div>

    <!-- SMS Card (bottom-center, below LEAD) -->
    <div class="card c-sms" :class="ch===2?'on':''">
      <div class="ci" style="background:rgba(139,92,246,0.12)">
        <svg width="16" height="16" fill="none" stroke="#8b5cf6" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
      </div>
      <div class="ct">SMS</div>
      <div class="cm">Recordatorio enviado</div>
      <div class="cb" style="background:rgba(139,92,246,0.10);color:#8b5cf6">
        <svg width="7" height="7" fill="none" stroke="#8b5cf6" stroke-width="3.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
        OK
      </div>
    </div>

    <!-- Chart Card (bottom-right) -->
    <div class="chart">
      <div class="chart-ttl">Escalado de Oportunidades</div>
      <svg class="chart-svg" viewBox="0 0 114 38" preserveAspectRatio="none">
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.01"/>
          </linearGradient>
        </defs>
        <path d="M0,36 C14,32 28,27 42,22 C56,17 70,12 84,7 C98,3 106,2 114,1 L114,38 L0,38 Z"
          fill="url(#cg)"/>
        <path d="M0,36 C14,32 28,27 42,22 C56,17 70,12 84,7 C98,3 106,2 114,1"
          fill="none" stroke="#3b82f6" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="114" cy="1" r="3" fill="#3b82f6"/>
        <circle cx="114" cy="1" r="5.5" fill="rgba(59,130,246,0.18)"/>
      </svg>
      <div class="chart-row">
        <span class="chart-v">×4.4</span>
        <span class="chart-p">↑ +34%</span>
      </div>
    </div>

  </div>
</body>
</html>
