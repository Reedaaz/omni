<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes Potenciales — Omnexor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: transparent;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Widget box ── */
    .widget {
      width: 560px;
      height: 420px;
      background: #ffffff;
      border-radius: 18px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 8px 32px rgba(59,130,246,0.08), 0 2px 8px rgba(0,0,0,0.04);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      pointer-events: none;
      user-select: none;
    }

    /* ── Header ── */
    .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #f1f5f9;
      flex-shrink: 0;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
    }
    .header-title {
      font-size: 13px;
      font-weight: 700;
      color: #1e293b;
    }
    .header-sub {
      font-size: 10px;
      color: #94a3b8;
      margin-top: 1px;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 99px;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.18);
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3b82f6;
      animation: ldot 1.8s ease-in-out infinite;
    }
    @keyframes ldot {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.7); }
    }
    .live-text {
      font-size: 10px;
      font-weight: 600;
      color: #3b82f6;
    }

    /* ── Kanban board ── */
    .board {
      flex: 1;
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .board::-webkit-scrollbar { height: 3px; }
    .board::-webkit-scrollbar-track { background: transparent; }
    .board::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.25); border-radius: 99px; }

    /* ── Column ── */
    .col {
      flex-shrink: 0;
      width: 120px;
      display: flex;
      flex-direction: column;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
    }
    .col-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .col-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .col-title {
      font-size: 10px;
      font-weight: 700;
      color: #475569;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .col-count {
      font-size: 9px;
      font-weight: 700;
      color: #94a3b8;
      background: #e2e8f0;
      padding: 1px 5px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .col-cards {
      flex: 1;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow-y: auto;
    }
    .col-cards::-webkit-scrollbar { width: 2px; }
    .col-cards::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.2); border-radius: 99px; }

    /* ── Card ── */
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 9px;
      padding: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .card-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }
    .card-avatar {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 8px;
      font-weight: 700;
      color: #ffffff;
      flex-shrink: 0;
    }
    .card-name {
      font-size: 10px;
      font-weight: 600;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-value {
      font-size: 9px;
      font-weight: 700;
      color: #10b981;
    }
    .card-badge {
      font-size: 8px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 99px;
    }

    /* ── Animated card (Juan Pérez) ── */
    .card.highlight {
      border-color: rgba(59,130,246,0.45);
      box-shadow: 0 0 0 2px rgba(59,130,246,0.10), 0 2px 12px rgba(59,130,246,0.15);
    }
    .card.moving {
      transform: scale(1.04);
      border-color: rgba(59,130,246,0.6);
      box-shadow: 0 0 16px rgba(59,130,246,0.3);
      transition: all 0.3s ease;
    }

    /* ── Footer stats ── */
    .widget-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-top: 1px solid #f1f5f9;
      flex-shrink: 0;
    }
    .footer-stat {
      text-align: center;
    }
    .footer-val {
      font-size: 14px;
      font-weight: 800;
      color: #3b82f6;
      line-height: 1;
    }
    .footer-lbl {
      font-size: 9px;
      font-weight: 500;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }
    .footer-divider {
      width: 1px;
      height: 24px;
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div
    class="widget"
    x-data="kanbanWidget()"
    x-init="init()"
  >

    <!-- Header -->
    <div class="widget-header">
      <div class="header-left">
        <div class="header-icon">
          <svg width="14" height="14" fill="none" stroke="#ffffff" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
          </svg>
        </div>
        <div>
          <div class="header-title">Clientes Potenciales</div>
          <div class="header-sub">Pipeline de ventas en tiempo real</div>
        </div>
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        <span class="live-text">En vivo</span>
      </div>
    </div>

    <!-- Kanban Board -->
    <div class="board">

      <!-- Column: Nuevo Lead -->
      <div class="col">
        <div class="col-header">
          <div class="col-dot" style="background:#3b82f6;box-shadow:0 0 4px #3b82f6"></div>
          <span class="col-title">Nuevo Lead</span>
          <span class="col-count" x-text="nuevoCount"></span>
        </div>
        <div class="col-cards">
          <!-- Juan Pérez — animated -->
          <div
            class="card"
            :class="animating ? 'moving' : (juanMoved ? '' : 'highlight')"
            x-show="!juanMoved"
            x-transition:leave="transition ease-in duration-300"
            x-transition:leave-start="opacity-100 scale-100"
            x-transition:leave-end="opacity-0 scale-95"
          >
            <div class="card-top">
              <div class="card-avatar">JP</div>
              <span class="card-name">Juan Pérez</span>
            </div>
            <div class="card-bottom">
              <span class="card-value">€1.500</span>
              <span class="card-badge" style="background:rgba(236,72,153,0.10);color:#ec4899">Instagram</span>
            </div>
          </div>
          <!-- Other leads -->
          <template x-for="lead in nuevoLeads" :key="lead.id">
            <div class="card">
              <div class="card-top">
                <div class="card-avatar" x-text="lead.initials"></div>
                <span class="card-name" x-text="lead.name"></span>
              </div>
              <div class="card-bottom">
                <span class="card-value" x-text="lead.value"></span>
                <span class="card-badge" :style="'background:'+lead.badgeBg+';color:'+lead.badgeColor" x-text="lead.source"></span>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Column: Calificado -->
      <div class="col">
        <div class="col-header">
          <div class="col-dot" style="background:#10b981;box-shadow:0 0 4px #10b981"></div>
          <span class="col-title">Calificado</span>
          <span class="col-count">2</span>
        </div>
        <div class="col-cards">
          <template x-for="lead in calificadoLeads" :key="lead.id">
            <div class="card">
              <div class="card-top">
                <div class="card-avatar" x-text="lead.initials"></div>
                <span class="card-name" x-text="lead.name"></span>
              </div>
              <div class="card-bottom">
                <span class="card-value" x-text="lead.value"></span>
                <span class="card-badge" :style="'background:'+lead.badgeBg+';color:'+lead.badgeColor" x-text="lead.source"></span>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Column: Contactado -->
      <div class="col">
        <div class="col-header">
          <div class="col-dot" style="background:#f59e0b;box-shadow:0 0 4px #f59e0b"></div>
          <span class="col-title">Contactado</span>
          <span class="col-count" x-text="contactadoCount"></span>
        </div>
        <div class="col-cards">
          <!-- Juan Pérez arrives here -->
          <div
            class="card"
            x-show="juanMoved"
            x-transition:enter="transition ease-out duration-500"
            x-transition:enter-start="opacity-0 translate-y-2"
            x-transition:enter-end="opacity-100 translate-y-0"
            style="border-color:rgba(245,158,11,0.4);box-shadow:0 0 10px rgba(245,158,11,0.12)"
          >
            <div class="card-top">
              <div class="card-avatar">JP</div>
              <span class="card-name">Juan Pérez</span>
            </div>
            <div class="card-bottom">
              <span class="card-value">€1.500</span>
              <span class="card-badge" style="background:rgba(245,158,11,0.10);color:#d97706">Contactado</span>
            </div>
          </div>
          <template x-for="lead in contactadoLeads" :key="lead.id">
            <div class="card">
              <div class="card-top">
                <div class="card-avatar" x-text="lead.initials"></div>
                <span class="card-name" x-text="lead.name"></span>
              </div>
              <div class="card-bottom">
                <span class="card-value" x-text="lead.value"></span>
                <span class="card-badge" :style="'background:'+lead.badgeBg+';color:'+lead.badgeColor" x-text="lead.source"></span>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Column: Reunión -->
      <div class="col">
        <div class="col-header">
          <div class="col-dot" style="background:#8b5cf6;box-shadow:0 0 4px #8b5cf6"></div>
          <span class="col-title">Reunión</span>
          <span class="col-count">1</span>
        </div>
        <div class="col-cards">
          <template x-for="lead in reunionLeads" :key="lead.id">
            <div class="card">
              <div class="card-top">
                <div class="card-avatar" x-text="lead.initials"></div>
                <span class="card-name" x-text="lead.name"></span>
              </div>
              <div class="card-bottom">
                <span class="card-value" x-text="lead.value"></span>
                <span class="card-badge" :style="'background:'+lead.badgeBg+';color:'+lead.badgeColor" x-text="lead.source"></span>
              </div>
            </div>
          </template>
        </div>
      </div>

    </div>

    <!-- Footer stats -->
    <div class="widget-footer">
      <div class="footer-stat">
        <div class="footer-val">10</div>
        <div class="footer-lbl">Leads Totales</div>
      </div>
      <div class="footer-divider"></div>
      <div class="footer-stat">
        <div class="footer-val">€614K</div>
        <div class="footer-lbl">Valor Pipeline</div>
      </div>
      <div class="footer-divider"></div>
      <div class="footer-stat">
        <div class="footer-val">67%</div>
        <div class="footer-lbl">Conversión</div>
      </div>
      <div class="footer-divider"></div>
      <div class="footer-stat">
        <div class="footer-val" style="color:#10b981">+8</div>
        <div class="footer-lbl">Esta semana</div>
      </div>
    </div>

  </div>

  <script>
    function kanbanWidget() {
      return {
        animating: false,
        juanMoved: false,
        animDone: false,

        nuevoLeads: [
          { id:2, initials:'LR', name:'Laura Ríos',      value:'€3.200', source:'Referido', badgeBg:'rgba(16,185,129,0.10)', badgeColor:'#059669' },
          { id:3, initials:'AC', name:'Andrés Castillo',  value:'€900',   source:'LinkedIn', badgeBg:'rgba(139,92,246,0.10)', badgeColor:'#7c3aed' },
        ],
        calificadoLeads: [
          { id:4, initials:'SH', name:'Sofía Herrera',    value:'€4.500', source:'Email',    badgeBg:'rgba(245,158,11,0.10)', badgeColor:'#d97706' },
          { id:5, initials:'MT', name:'Miguel Torres',    value:'€12K',   source:'Evento',   badgeBg:'rgba(236,72,153,0.10)', badgeColor:'#db2777' },
        ],
        contactadoLeads: [
          { id:7, initials:'DM', name:'Diana Morales',    value:'€2.800', source:'LinkedIn', badgeBg:'rgba(139,92,246,0.10)', badgeColor:'#7c3aed' },
        ],
        reunionLeads: [
          { id:8, initials:'PV', name:'Patricia Vega',    value:'€5.000', source:'Web',      badgeBg:'rgba(59,130,246,0.10)', badgeColor:'#2563eb' },
        ],

        get nuevoCount() {
          return this.nuevoLeads.length + (this.juanMoved ? 0 : 1);
        },
        get contactadoCount() {
          return this.contactadoLeads.length + (this.juanMoved ? 1 : 0);
        },

        init() {
          // Trigger animation 3 seconds after load
          setTimeout(() => {
            if (this.animDone) return;
            this.animating = true;
            setTimeout(() => {
              this.juanMoved = true;
              setTimeout(() => {
                this.animating = false;
                this.animDone = true;
              }, 600);
            }, 800);
          }, 3000);
        },
      };
    }
  </script>
</body>
</html>
