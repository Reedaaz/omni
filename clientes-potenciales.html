<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes Potenciales — Omnexor</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            omnexor: {
              DEFAULT: '#4f46e5',
              50:  '#eef2ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              600: '#4f46e5',
              700: '#4338ca',
            },
          },
          borderRadius: {
            card: '1rem',
          },
        },
      },
    };
  </script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }

    /* Thin custom scrollbar for kanban columns */
    .kanban-col::-webkit-scrollbar { width: 4px; }
    .kanban-col::-webkit-scrollbar-track { background: transparent; }
    .kanban-col::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 9999px; }
  </style>
</head>

<body
  class="min-h-screen bg-[#f8fafc] text-gray-800 antialiased"
  x-data="kanban()"
>

  <!-- ===== Page Header ===== -->
  <div class="px-6 pt-6 pb-4 max-w-full">
    <div class="flex items-center justify-between flex-wrap gap-3">
      <div>
        <h1 class="text-xl font-bold text-gray-900">Clientes Potenciales</h1>
        <p class="text-sm text-gray-500 mt-0.5">Pipeline de ventas — gestiona tus leads por etapa</p>
      </div>
      <!-- Add lead button -->
      <button
        @click="openModal()"
        class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
        Nuevo Lead
      </button>
    </div>
  </div>

  <!-- ===== Kanban Board ===== -->
  <div class="px-6 pb-8 overflow-x-auto">
    <div class="flex gap-4 min-w-max">

      <template x-for="col in columns" :key="col.id">
        <div class="flex flex-col w-72 flex-shrink-0">

          <!-- Column Header -->
          <div class="flex items-center justify-between px-4 py-3 rounded-t-card bg-indigo-600 shadow-sm">
            <div class="flex items-center gap-2">
              <span class="text-sm font-semibold text-white" x-text="col.title"></span>
              <span
                class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-white/20 text-white text-xs font-bold"
                x-text="col.leads.length"
              ></span>
            </div>
            <!-- Column total value -->
            <span
              class="text-xs font-medium text-indigo-100"
              x-text="formatTotal(col.leads)"
            ></span>
          </div>

          <!-- Cards Container -->
          <div
            class="kanban-col flex-1 flex flex-col gap-3 p-3 bg-indigo-50/60 rounded-b-card min-h-[24rem] max-h-[calc(100vh-14rem)] overflow-y-auto"
            @dragover.prevent
            @drop="drop($event, col.id)"
          >
            <template x-for="lead in col.leads" :key="lead.id">
              <!-- Lead Card -->
              <div
                class="bg-white rounded-card border border-gray-100 shadow-sm p-4 cursor-grab active:cursor-grabbing hover:shadow-md transition-shadow duration-150 group"
                draggable="true"
                @dragstart="dragStart($event, lead.id, col.id)"
              >
                <!-- Card Top: name + source badge -->
                <div class="flex items-start justify-between gap-2 mb-3">
                  <div class="flex items-center gap-2 min-w-0">
                    <!-- Avatar initials -->
                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
                      <span class="text-xs font-bold text-indigo-700" x-text="initials(lead.nombre)"></span>
                    </div>
                    <div class="min-w-0">
                      <p class="text-sm font-semibold text-gray-900 truncate" x-text="lead.nombre"></p>
                      <p class="text-xs text-gray-400 truncate" x-text="lead.empresa || '—'"></p>
                    </div>
                  </div>
                  <!-- Source badge -->
                  <span
                    class="flex-shrink-0 inline-block px-2 py-0.5 rounded-full text-[10px] font-semibold uppercase tracking-wide"
                    :class="sourceBadge(lead.fuente)"
                    x-text="lead.fuente"
                  ></span>
                </div>

                <!-- Divider -->
                <div class="border-t border-gray-100 my-2"></div>

                <!-- Card Meta -->
                <div class="flex items-center justify-between text-xs text-gray-500">
                  <!-- Value -->
                  <div class="flex items-center gap-1">
                    <svg class="w-3.5 h-3.5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span class="font-semibold text-gray-700" x-text="formatCurrency(lead.valor)"></span>
                  </div>
                  <!-- Date -->
                  <div class="flex items-center gap-1">
                    <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <span x-text="lead.fecha"></span>
                  </div>
                </div>

                <!-- Labels row -->
                <div class="mt-3 grid grid-cols-3 gap-1 text-[10px] text-gray-400">
                  <div>
                    <span class="block font-medium text-gray-500 uppercase tracking-wide">Nombre</span>
                    <span class="truncate block" x-text="lead.nombre"></span>
                  </div>
                  <div>
                    <span class="block font-medium text-gray-500 uppercase tracking-wide">Valor</span>
                    <span class="truncate block" x-text="formatCurrency(lead.valor)"></span>
                  </div>
                  <div>
                    <span class="block font-medium text-gray-500 uppercase tracking-wide">Fuente</span>
                    <span class="truncate block" x-text="lead.fuente"></span>
                  </div>
                </div>

                <!-- Action row (visible on hover) -->
                <div class="mt-3 flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-150">
                  <button
                    @click="editLead(lead)"
                    class="flex-1 text-xs text-indigo-600 font-medium py-1 rounded-md hover:bg-indigo-50 transition-colors"
                  >Editar</button>
                  <button
                    @click="deleteLead(lead.id, col.id)"
                    class="flex-1 text-xs text-red-500 font-medium py-1 rounded-md hover:bg-red-50 transition-colors"
                  >Eliminar</button>
                </div>
              </div>
            </template>

            <!-- Empty state -->
            <div
              x-show="col.leads.length === 0"
              class="flex flex-col items-center justify-center py-10 text-gray-300 select-none"
            >
              <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
              <p class="text-xs">Sin leads en esta etapa</p>
            </div>
          </div>

        </div>
      </template>

    </div>
  </div>

  <!-- ===== Add / Edit Lead Modal ===== -->
  <div
    x-show="modal.open"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm"
    @click.self="closeModal()"
  >
    <div
      x-show="modal.open"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100 scale-100"
      x-transition:leave-end="opacity-0 scale-95"
      class="bg-white rounded-card shadow-xl w-full max-w-md p-6"
    >
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-base font-bold text-gray-900" x-text="modal.editing ? 'Editar Lead' : 'Nuevo Lead'"></h2>
        <button @click="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <form @submit.prevent="saveLead()" class="space-y-4">
        <!-- Nombre del contacto -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Nombre del contacto <span class="text-red-500">*</span></label>
          <input
            x-model="modal.form.nombre"
            type="text"
            placeholder="Ej. María García"
            required
            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
        </div>

        <!-- Empresa -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Empresa</label>
          <input
            x-model="modal.form.empresa"
            type="text"
            placeholder="Ej. Acme S.A."
            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
        </div>

        <!-- Valor -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Valor estimado (MXN)</label>
          <input
            x-model.number="modal.form.valor"
            type="number"
            min="0"
            step="100"
            placeholder="0"
            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
        </div>

        <!-- Fuente -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Fuente</label>
          <select
            x-model="modal.form.fuente"
            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white"
          >
            <option value="Web">Web</option>
            <option value="Referido">Referido</option>
            <option value="LinkedIn">LinkedIn</option>
            <option value="Email">Email</option>
            <option value="Evento">Evento</option>
            <option value="Otro">Otro</option>
          </select>
        </div>

        <!-- Etapa -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Etapa</label>
          <select
            x-model="modal.form.columna"
            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white"
          >
            <template x-for="col in columns" :key="col.id">
              <option :value="col.id" x-text="col.title"></option>
            </template>
          </select>
        </div>

        <!-- Actions -->
        <div class="flex gap-3 pt-2">
          <button
            type="button"
            @click="closeModal()"
            class="flex-1 px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors"
          >Cancelar</button>
          <button
            type="submit"
            class="flex-1 px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition-colors"
            x-text="modal.editing ? 'Guardar cambios' : 'Agregar lead'"
          ></button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== Alpine.js Component Logic ===== -->
  <script>
    function kanban() {
      return {
        // ── State ──────────────────────────────────────────────
        drag: { leadId: null, fromCol: null },

        modal: {
          open: false,
          editing: false,
          editId: null,
          form: { nombre: '', empresa: '', valor: 0, fuente: 'Web', columna: 'nuevo' },
        },

        columns: [
          {
            id: 'nuevo',
            title: 'Nuevo Lead',
            leads: [
              { id: 1, nombre: 'Carlos Mendoza',   empresa: 'TechSol MX',    valor: 45000,  fuente: 'Web',      fecha: '24 feb' },
              { id: 2, nombre: 'Laura Ríos',        empresa: 'Grupo Ríos',    valor: 120000, fuente: 'Referido', fecha: '25 feb' },
              { id: 3, nombre: 'Andrés Castillo',   empresa: '',              valor: 18000,  fuente: 'LinkedIn', fecha: '26 feb' },
            ],
          },
          {
            id: 'calificado',
            title: 'Lead Calificado',
            leads: [
              { id: 4, nombre: 'Sofía Herrera',     empresa: 'Innovatek',     valor: 75000,  fuente: 'Email',    fecha: '20 feb' },
              { id: 5, nombre: 'Miguel Torres',     empresa: 'Distribuidora T', valor: 200000, fuente: 'Evento', fecha: '22 feb' },
            ],
          },
          {
            id: 'no-calificado',
            title: 'Lead NO calificado',
            leads: [
              { id: 6, nombre: 'Patricia Vega',     empresa: 'Vega & Asoc.',  valor: 5000,   fuente: 'Web',      fecha: '18 feb' },
            ],
          },
          {
            id: 'contactado',
            title: 'Contactado',
            leads: [
              { id: 7, nombre: 'Roberto Salinas',   empresa: 'Salinas Corp',  valor: 95000,  fuente: 'Referido', fecha: '15 feb' },
              { id: 8, nombre: 'Diana Morales',     empresa: 'DM Consulting', valor: 60000,  fuente: 'LinkedIn', fecha: '17 feb' },
            ],
          },
          {
            id: 'reunion',
            title: 'Reunión Agendada',
            leads: [
              { id: 9, nombre: 'Fernando Leal',     empresa: 'Leal Ventures', valor: 350000, fuente: 'Referido', fecha: '12 feb' },
              { id: 10, nombre: 'Valeria Núñez',    empresa: 'NúñezTech',     valor: 180000, fuente: 'Evento',   fecha: '14 feb' },
            ],
          },
        ],

        // ── Helpers ────────────────────────────────────────────
        nextId() {
          return Math.max(0, ...this.columns.flatMap(c => c.leads.map(l => l.id))) + 1;
        },

        initials(name) {
          return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
        },

        formatCurrency(val) {
          return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', maximumFractionDigits: 0 }).format(val || 0);
        },

        formatTotal(leads) {
          const sum = leads.reduce((a, l) => a + (l.valor || 0), 0);
          return this.formatCurrency(sum);
        },

        sourceBadge(fuente) {
          const map = {
            Web:      'bg-blue-100 text-blue-700',
            Referido: 'bg-emerald-100 text-emerald-700',
            LinkedIn: 'bg-indigo-100 text-indigo-700',
            Email:    'bg-amber-100 text-amber-700',
            Evento:   'bg-purple-100 text-purple-700',
            Otro:     'bg-gray-100 text-gray-600',
          };
          return map[fuente] || map['Otro'];
        },

        // ── Drag & Drop ────────────────────────────────────────
        dragStart(event, leadId, colId) {
          this.drag = { leadId, fromCol: colId };
          event.dataTransfer.effectAllowed = 'move';
        },

        drop(event, toColId) {
          const { leadId, fromCol } = this.drag;
          if (!leadId || fromCol === toColId) return;

          const from = this.columns.find(c => c.id === fromCol);
          const to   = this.columns.find(c => c.id === toColId);
          if (!from || !to) return;

          const idx  = from.leads.findIndex(l => l.id === leadId);
          if (idx === -1) return;

          const [lead] = from.leads.splice(idx, 1);
          to.leads.push(lead);
          this.drag = { leadId: null, fromCol: null };
        },

        // ── Modal ──────────────────────────────────────────────
        openModal() {
          this.modal = {
            open: true,
            editing: false,
            editId: null,
            form: { nombre: '', empresa: '', valor: 0, fuente: 'Web', columna: this.columns[0].id },
          };
        },

        editLead(lead) {
          const col = this.columns.find(c => c.leads.some(l => l.id === lead.id));
          this.modal = {
            open: true,
            editing: true,
            editId: lead.id,
            form: { nombre: lead.nombre, empresa: lead.empresa || '', valor: lead.valor, fuente: lead.fuente, columna: col?.id || this.columns[0].id },
          };
        },

        saveLead() {
          const today = new Date().toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
          if (this.modal.editing) {
            // Update existing lead (may move column)
            for (const col of this.columns) {
              const idx = col.leads.findIndex(l => l.id === this.modal.editId);
              if (idx !== -1) {
                const lead = col.leads[idx];
                Object.assign(lead, {
                  nombre:  this.modal.form.nombre,
                  empresa: this.modal.form.empresa,
                  valor:   this.modal.form.valor,
                  fuente:  this.modal.form.fuente,
                });
                // Move column if changed
                if (col.id !== this.modal.form.columna) {
                  col.leads.splice(idx, 1);
                  const target = this.columns.find(c => c.id === this.modal.form.columna);
                  target?.leads.push(lead);
                }
                break;
              }
            }
          } else {
            const target = this.columns.find(c => c.id === this.modal.form.columna);
            target?.leads.push({
              id:      this.nextId(),
              nombre:  this.modal.form.nombre,
              empresa: this.modal.form.empresa,
              valor:   this.modal.form.valor,
              fuente:  this.modal.form.fuente,
              fecha:   today,
            });
          }
          this.closeModal();
        },

        closeModal() {
          this.modal.open = false;
        },

        deleteLead(leadId, colId) {
          const col = this.columns.find(c => c.id === colId);
          if (col) col.leads = col.leads.filter(l => l.id !== leadId);
        },
      };
    }
  </script>

</body>
</html>
