<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omnexor — Results Widget</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: transparent;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Widget container ── */
    .widget {
      width: 280px;
      background: #ffffff;
      border-radius: 1.25rem;
      padding: 1.25rem;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.12), 0 2px 8px rgba(59, 130, 246, 0.06);
      border: 1px solid rgba(59, 130, 246, 0.12);
      overflow: hidden;
    }

    /* ── Widget header ── */
    .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.875rem;
    }
    .widget-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.2rem 0.625rem;
      border-radius: 99px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #10b981;
      animation: live-pulse 1.6s ease-in-out infinite;
    }
    @keyframes live-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }
    .live-text {
      font-size: 0.625rem;
      font-weight: 600;
      color: #10b981;
    }

    /* ── Notification feed ── */
    .feed-container {
      position: relative;
      height: 200px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .feed-inner {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
    }

    /* ── Notification card ── */
    .notif-card {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.625rem 0.75rem;
      background: #f8fafc;
      border: 1px solid rgba(59, 130, 246, 0.1);
      border-radius: 0.75rem;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.06);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .notif-card.entering {
      animation: slide-in-bottom 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .notif-card.exiting {
      animation: fade-out-top 0.4s ease forwards;
    }
    @keyframes slide-in-bottom {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fade-out-top {
      from { opacity: 1; transform: translateY(0); max-height: 60px; margin-bottom: 0.5rem; }
      to   { opacity: 0; transform: translateY(-12px); max-height: 0; margin-bottom: 0; padding: 0; }
    }

    /* ── Notif icon ── */
    .notif-icon {
      width: 2rem; height: 2rem;
      border-radius: 0.625rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── Notif text ── */
    .notif-label {
      font-size: 0.6875rem;
      font-weight: 600;
      color: #1e293b;
      line-height: 1.3;
    }
    .notif-sub {
      font-size: 0.625rem;
      color: #64748b;
      margin-top: 0.1rem;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(59,130,246,0.15), transparent);
      margin-bottom: 0.875rem;
    }

    /* ── Stats row ── */
    .stats-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .stat-item {
      text-align: center;
      flex: 1;
    }
    .stat-value {
      font-size: 1.375rem;
      font-weight: 800;
      color: #3b82f6;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .stat-value.counting {
      animation: count-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes count-pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.18); color: #2563eb; }
      100% { transform: scale(1); }
    }
    .stat-label {
      font-size: 0.625rem;
      font-weight: 500;
      color: #94a3b8;
      margin-top: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-divider {
      width: 1px;
      height: 2rem;
      background: rgba(59,130,246,0.12);
    }

    /* ── Trend badge ── */
    .trend-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.625rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 99px;
      background: rgba(16,185,129,0.1);
      color: #10b981;
      margin-top: 0.25rem;
    }
  </style>
</head>

<body>
  <div
    class="widget"
    x-data="resultsWidget()"
    x-init="init()"
  >

    <!-- Header -->
    <div class="widget-header">
      <span class="widget-title">Resultados en Vivo</span>
      <div class="live-badge">
        <div class="live-dot"></div>
        <span class="live-text">En vivo</span>
      </div>
    </div>

    <!-- Notification feed -->
    <div class="feed-container">
      <div class="feed-inner">
        <template x-for="(notif, i) in visibleNotifs" :key="notif.uid">
          <div
            class="notif-card"
            :class="notif.state"
          >
            <!-- Icon -->
            <div class="notif-icon" :style="'background:' + notif.iconBg">
              <svg class="w-4 h-4" :style="'color:' + notif.iconColor" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" :d="notif.icon" />
              </svg>
            </div>
            <!-- Text -->
            <div style="min-width:0; flex:1;">
              <p class="notif-label" x-text="notif.label"></p>
              <p class="notif-sub" x-text="notif.sub"></p>
            </div>
            <!-- Time -->
            <span style="font-size:0.6rem; color:#cbd5e1; flex-shrink:0;" x-text="notif.time"></span>
          </div>
        </template>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Stats -->
    <div class="stats-row">
      <!-- Total Leads Hoy -->
      <div class="stat-item">
        <div
          class="stat-value"
          :class="counting ? 'counting' : ''"
          x-text="totalLeads"
        ></div>
        <div class="stat-label">Leads Hoy</div>
        <div class="trend-badge">
          <svg style="width:0.625rem;height:0.625rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
          </svg>
          +8.3%
        </div>
      </div>

      <div class="stat-divider"></div>

      <!-- Citas Hoy -->
      <div class="stat-item">
        <div class="stat-value" x-text="citasHoy"></div>
        <div class="stat-label">Citas Hoy</div>
        <div class="trend-badge">
          <svg style="width:0.625rem;height:0.625rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
          </svg>
          +12%
        </div>
      </div>

      <div class="stat-divider"></div>

      <!-- Tasa Conversión -->
      <div class="stat-item">
        <div class="stat-value">67%</div>
        <div class="stat-label">Conversión</div>
        <div class="trend-badge">
          <svg style="width:0.625rem;height:0.625rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
          </svg>
          +4.1%
        </div>
      </div>
    </div>

  </div>

  <script>
    function resultsWidget() {
      return {
        /* ── Notification templates ── */
        notifTemplates: [
          {
            label: 'Nuevo Lead: Sofía Herrera',
            sub: 'Instagram · hace un momento',
            icon: 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z',
            iconBg: 'rgba(236,72,153,0.12)',
            iconColor: '#ec4899',
          },
          {
            label: 'Cita Agendada',
            sub: 'Mañana 10:00 AM · confirmada',
            icon: 'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z',
            iconBg: 'rgba(59,130,246,0.12)',
            iconColor: '#3b82f6',
          },
          {
            label: 'Lead Calificado',
            sub: 'Carlos Mendoza · €2.400/mes',
            icon: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z',
            iconBg: 'rgba(16,185,129,0.12)',
            iconColor: '#10b981',
          },
          {
            label: 'Webinar Registrado',
            sub: 'Lucía Fernández · 14:00 h',
            icon: 'M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z',
            iconBg: 'rgba(139,92,246,0.12)',
            iconColor: '#8b5cf6',
          },
        ],

        /* ── State ── */
        visibleNotifs: [],
        uidCounter: 0,
        templateIndex: 0,
        totalLeads: 124,
        citasHoy: 28,
        counting: false,
        feedTimer: null,
        leadsTimer: null,

        /* ── Helpers ── */
        getNow() {
          const d = new Date();
          return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        },

        addNotif() {
          const tpl = this.notifTemplates[this.templateIndex % this.notifTemplates.length];
          this.templateIndex++;

          const notif = {
            ...tpl,
            uid: ++this.uidCounter,
            time: this.getNow(),
            state: 'entering',
          };

          this.visibleNotifs.push(notif);

          // Keep max 3 visible; mark oldest as exiting after a short delay
          if (this.visibleNotifs.length > 3) {
            const oldest = this.visibleNotifs[0];
            oldest.state = 'exiting';
            setTimeout(() => {
              this.visibleNotifs = this.visibleNotifs.filter(n => n.uid !== oldest.uid);
            }, 420);
          }

          // Remove entering class after animation
          setTimeout(() => {
            const n = this.visibleNotifs.find(n => n.uid === notif.uid);
            if (n) n.state = '';
          }, 500);
        },

        incrementLeads() {
          this.totalLeads++;
          this.counting = true;
          setTimeout(() => { this.counting = false; }, 350);
        },

        init() {
          // Seed with first 2 notifications immediately
          this.addNotif();
          setTimeout(() => this.addNotif(), 800);

          // Cycle new notification every 4 seconds
          this.feedTimer = setInterval(() => {
            this.addNotif();
          }, 4000);

          // Increment leads counter every ~7 seconds (random feel)
          const scheduleLeadIncrement = () => {
            const delay = 6000 + Math.random() * 4000;
            this.leadsTimer = setTimeout(() => {
              this.incrementLeads();
              scheduleLeadIncrement();
            }, delay);
          };
          scheduleLeadIncrement();
        },
      };
    }
  </script>
</body>
</html>
